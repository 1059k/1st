<!DOCTYPE html>
<html>
<head>
  <title>AI Memo App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main>
    <h1>Kenny様のMemo Appですお</h1>

    <div class="input-area">
      <input type="text" id="memoInput" placeholder="メモを書く">
      <button id="addButton">追加</button>
    </div>

    <div class="list-area">
      <section class="memo-box">
        <h2>やる事（未達成）</h2>
        <ul id="memoList"></ul>
      </section>

      <section class="memo-box">
        <h2>達成済み</h2>
        <ul id="doneList"></ul>
      </section>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
