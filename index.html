<!DOCTYPE html>
<html>
<head>
  <title>AI Memo App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main>
    <h1>Memo Board</h1>

    <div class="input-area">
      <input type="text" id="memoInput" placeholder="Write a memo">
      <button id="addButton">Add</button>
    </div>

    <div class="list-area">
      <section class="memo-box">
        <h2>To Do</h2>
        <ul id="memoList"></ul>
      </section>

      <section class="memo-box">
        <h2>Done</h2>
        <ul id="doneList"></ul>
      </section>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
